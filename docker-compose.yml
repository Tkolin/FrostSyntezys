services:
  # ---------- База данных (MySQL 8) ----------
  db:
    image: mysql:8.0
    container_name: fs_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-backend}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 30

  # ---------- Бэкенд (Laravel 11 + GraphQL) ----------
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: fs_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:${BACKEND_PORT:-8000}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-backend}
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-root}
      # true — наполнить БД демо-данными из DatabaseSeeder
      DB_SEED: ${DB_SEED:-false}
      # Пользователь для входа (логин выполняется по полю name)
      ADMIN_NAME: ${ADMIN_NAME:-admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-password}
    ports:
      # Фронтенд жёстко ходит на localhost:8000 — порт фиксирован
      - "${BACKEND_PORT:-8000}:8000"

  # ---------- Фронтенд (React / CRA) ----------
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: fs_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

  # ---------- Админка БД (phpMyAdmin) ----------
  phpmyadmin:
    image: phpmyadmin:5
    container_name: fs_pma
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${DB_PASSWORD:-root}
      UPLOAD_LIMIT: 256M
    ports:
      - "${PMA_PORT:-8080}:80"

volumes:
  db_data:
